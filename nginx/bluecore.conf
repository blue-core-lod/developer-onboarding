map $http_x_forwarded_proto $forwarded_proto {
  default $http_x_forwarded_proto;
  ""      $scheme;
}

server {
    absolute_redirect off;

    location / {
        root /var/www/html;
    }

    location /api/docs {
        proxy_pass http://bc_api:8100/docs;
    }

    location /api/openapi.json {
        proxy_pass http://bc_api:8100/openapi.json;
    }

    location /api/ {
        proxy_pass http://bc_api:8100/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /instances/ {
        proxy_pass http://bc_api:8100/instances/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header  Authorization $http_authorization;
    }

    location /works/ {
        proxy_pass http://bc_api:8100/works/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location /workflows/ {
        proxy_pass http://airflow-apiserver:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /keycloak/ {
      proxy_pass http://keycloak:8080;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /sinopia/ {
        proxy_pass http://sinopia:8004/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_cache_bypass $http_upgrade;
    }

    location /marva/ {
        proxy_pass http://marva:8004/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location  /health-check {
        return 200 'ok';
        add_header Content-Type text/plain;
        access_log off;
    }
}
